<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coctelería</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#000000;color:#f0e6d3;min-height:100vh}
.header{text-align:center;padding:2.5rem 1rem 2rem;background:linear-gradient(180deg,#1a0508 0%,#0d0405 100%)}
.header h1{
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 42px;
  font-weight: normal;
  letter-spacing: 2px;
  text-transform: none;
  color: #ffffff;
  margin-bottom: 8px;
}
.header p{
  font-size: 15px;
  color: #f0e6d3;
  margin-top: 0;
  letter-spacing: 1.5px;
  font-weight: 400;
}
.divider{width:60px;height:1px;background:#6b3a1f;margin:16px auto 0}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:16px 12px;max-width:960px;margin:0 auto;padding-bottom:100px}
.card{border-radius:16px;overflow:hidden}
.card-img{
  width:100%;
  height:150px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:56px;
  background-color:#1a0c0e;   /* color de fondo mientras carga la imagen */
  background-size:contain !important;
  background-position:center;
  background-repeat:no-repeat;
}
.card-body{padding:16px 18px 20px}
.card-name{font-size:18px;font-weight:500;color:#ffffff}
.card-price{font-size:15px;color:#ffffff;margin-top:4px;font-weight:500;opacity:0.85}
.ing-label{font-size:11px;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:1px;margin-top:14px;margin-bottom:7px}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:rgba(0,0,0,0.35);border:0.5px solid rgba(255,255,255,0.2);border-radius:20px;padding:4px 10px;font-size:12px;color:#ffffff}
.qty-row{display:flex;align-items:center;justify-content:space-between;margin-top:16px;gap:10px}
.qty-ctrl{display:flex;align-items:center}
.qb{width:34px;height:34px;background:rgba(0,0,0,0.3);border:0.5px solid rgba(255,255,255,0.2);color:#ffffff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qb:first-child{border-radius:8px 0 0 8px}
.qb:last-child{border-radius:0 8px 8px 0}
.qb:hover{background:rgba(0,0,0,0.5)}
.qn{width:38px;height:34px;background:rgba(0,0,0,0.2);border-top:0.5px solid rgba(255,255,255,0.2);border-bottom:0.5px solid rgba(255,255,255,0.2);border-left:none;border-right:none;color:#ffffff;font-size:15px;font-weight:500;text-align:center;display:flex;align-items:center;justify-content:center;user-select:none}
.add-btn{flex:1;padding:10px 12px;background:rgba(255,255,255,0.15);color:#ffffff;border:0.5px solid rgba(255,255,255,0.3);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.add-btn:hover{background:rgba(255,255,255,0.25)}
.add-btn.added{background:#2a7a4a;color:white}
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:#1a0c0e;border-top:0.5px solid #4a2a18;padding:14px 20px;display:none;align-items:center;justify-content:space-between;z-index:50}
.cart-bar.visible{display:flex}
.cart-info .cart-items{font-size:13px;color:#a08060}
.cart-info .cart-total{font-size:17px;color:#e8c97a;font-weight:600}
.cart-btn{padding:11px 24px;background:#e8c97a;color:#1a0c0e;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.cart-btn:hover{background:#d4b560}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#1a0c0e;border-radius:16px 16px 0 0;padding:24px 20px;width:100%;max-width:480px;border-top:0.5px solid #3d2010;max-height:92vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-hdr h2{font-size:19px;font-weight:500;color:#f0e6d3}
.close-x{background:none;border:none;color:#7a5a40;font-size:24px;cursor:pointer;line-height:1}
.oi{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid #2a1410}
.oi:last-child{border-bottom:none}
.oi-left .oi-name{font-size:14px;color:#f0e6d3}
.oi-left .oi-qty{font-size:12px;color:#a08060;margin-top:2px}
.oi-right{display:flex;align-items:center;gap:8px}
.oi-price{font-size:14px;color:#e8c97a;font-weight:500}
.oi-del{background:none;border:none;color:#6a3a20;font-size:20px;cursor:pointer;line-height:1;padding:0}
.oi-del:hover{color:#d44a4a}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-top:0.5px solid #4a2a18;margin:4px 0 18px}
.total-row span{font-size:14px;color:#a08060}
.total-row strong{font-size:19px;color:#e8c97a}
.modal label{font-size:13px;color:#a08060;display:block;margin-bottom:6px;margin-top:14px}
.modal input{width:100%;padding:10px 12px;background:#2a1410;border:0.5px solid #4a2a18;border-radius:8px;color:#f0e6d3;font-size:14px;outline:none}
.modal input:focus{border-color:#e8c97a}
.modal input::placeholder{color:#5a3a20}
.pay-tabs{display:flex;gap:8px;margin:16px 0 12px}
.pay-tab{flex:1;padding:9px;border:0.5px solid #4a2a18;border-radius:8px;background:#2a1410;color:#a08060;font-size:13px;cursor:pointer;text-align:center}
.pay-tab.active{border-color:#e8c97a;color:#e8c97a;background:#2d1a05}
.qr-box{background:#2a1410;border-radius:12px;padding:16px;text-align:center;border:0.5px solid #4a2a18}
.qr-box img{width:150px;height:150px;border-radius:8px;margin-bottom:10px;background:white;padding:4px}
.qr-amount{font-size:18px;font-weight:600;color:#e8c97a;margin-bottom:4px}
.qr-info{font-size:12px;color:#a08060;line-height:1.7}
.qr-num{font-size:15px;color:#f0e6d3;font-weight:500}
.confirm-btn{width:100%;padding:13px;background:#2a7a4a;color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:18px}
.confirm-btn:hover{background:#236a3e}
.cancel-lnk{display:block;text-align:center;margin-top:12px;font-size:13px;color:#7a5a40;cursor:pointer;padding-bottom:4px}
.success{display:none;text-align:center;padding:20px 0 10px}
.check-circle{width:64px;height:64px;background:#1a4a2a;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:26px}
.success h3{font-size:20px;font-weight:500;color:#f0e6d3;margin-bottom:8px}
.success p{font-size:14px;color:#a08060;line-height:1.6}
.success .close-btn{display:inline-block;margin-top:20px;padding:11px 32px;background:#e8c97a;color:#1a0c0e;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.empty-note{font-size:13px;color:#5a3a20;text-align:center;padding:12px 0}
/* Ajustes para móviles: dos columnas con tarjetas compactas */
@media (max-width: 600px) {
  .grid {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 10px;
    padding: 16px 10px;
  }
  .card-img {
    height: 110px;          /* antes 170px */
    font-size: 40px;        /* antes 56px */
  }
  .card-body {
    padding: 10px 12px 14px;
  }
  .card-name {
    font-size: 15px;        /* antes 18px */
  }
  .card-price {
    font-size: 13px;        /* antes 15px */
  }
  .ing-label {
    margin-top: 8px;
    margin-bottom: 4px;
    font-size: 9px;
  }
  .tags {
    font-size: 11px;        /* antes 13px */
    line-height: 1.3;
  }
  .qty-row {
    margin-top: 10px;
    gap: 6px;
  }
  .qb {
    width: 28px;
    height: 28px;
    font-size: 18px;
  }
  .qn {
    width: 30px;
    height: 28px;
    font-size: 13px;
  }
  .add-btn {
    padding: 8px 6px;
    font-size: 11px;
  }
  body {
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}
}</style>
<style>
        /* Estilos para la tarjeta de promoción (Mojito) */
.card.promo {
  position: relative;
  box-shadow: 0 0 15px 3px #e8c97a;
  animation: brilloPromo 2s infinite alternate;
  border: 1px solid #e8c97a !important;
}

@keyframes brilloPromo {
  from { box-shadow: 0 0 10px 2px #e8c97a; }
  to { box-shadow: 0 0 20px 6px #fff3b0; }
}

.promo-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #e8c97a;
  color: #1a0c0e;
  font-weight: bold;
  font-size: 18px;
  padding: 6px 12px;
  border-radius: 30px;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  letter-spacing: 1px;
  border: 1px solid #ffffff80;
}
    </style>

    <div class="header">
        <!-- ÍCONO DE COPA MARGARITA (BLANCO Y NEGRO) -->
        <i class="fas fa-cocktail" style="font-size: 48px; color: #ffffff; margin-bottom: 10px;"></i>
        <h1>Coctelería</h1>
        <p>1. Elige tus cócteles · 2. Agrega al pedido · 3. Confirma</p>
        <div class="divider"></div>
    </div>

<div class="grid" id="menu"></div>

<div class="cart-bar" id="cart-bar">
  <div class="cart-info">
    <div class="cart-total" id="cart-total">$0</div>
    <div class="cart-items" id="cart-items">0 ítems</div>
  </div>
  <button class="cart-btn" onclick="abrirModal()">Ver pedido →</button>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div id="form-view">
      <div class="modal-hdr">
        <h2>Tu pedido</h2>
        <button class="close-x" onclick="cerrar()">×</button>
      </div>
      <div id="order-items"></div>
      <div class="total-row">
        <span>Total</span>
        <strong id="modal-total">$0</strong>
      </div>
      <label>Número de mesa</label>
      <input type="number" id="mesa" placeholder="Ej: 5" min="1" max="99">
      <label>Notas (opcional)</label>
      <input type="text" id="notas" placeholder="Sin azúcar, extra limón...">
      <label style="margin-top:20px">Método de pago</label>
      <div class="pay-tabs">
        <div class="pay-tab active" onclick="switchPay('nequi',this)">Nequi</div>
        <div class="pay-tab" onclick="switchPay('bancolombia',this)">Bancolombia</div>
      </div>
      <div class="qr-box">
        <img id="qr-img" src="" alt="QR pago">
        <div class="qr-amount" id="qr-amount">$0</div>
        <div class="qr-info">Llave BreB · <span id="pay-label">Nequi</span><div class="qr-num">3146228049</div></div>
      </div>
      <button class="confirm-btn" onclick="enviarPedido()">✓ Confirmar pedido</button>
      <span class="cancel-lnk" onclick="cerrar()">Cancelar</span>
    </div>
    <div class="success" id="success-view">
      <div class="check-circle">✓</div>
      <h3>¡Pedido enviado!</h3>
      <p>Tu pedido fue recibido.<br>Lo llevamos a tu mesa en unos minutos.</p>
      <button class="close-btn" onclick="cerrarReset()">Cerrar</button>
    </div>
  </div>
</div>

  {n:"Valentine Blush",p:50000,e:"🌸",g:"135deg,#3d001a,#9a005a,#ee44aa",bg:"#2d001a",border:"#9a005a",i:["Ginebra","Granadina","Limón","Fresa"], desc:"Coctel romántico a base de ginebra, granadina, limón y fresa.", img:"img/valentine-blush.jpg"}
];

let carrito={};
let cant={};
let metodo="nequi";
cocteles.forEach((_,i)=>{carrito[i]=0;cant[i]=1;});

const fmt=n=>"$"+n.toLocaleString("es-CO");
const total=()=>cocteles.reduce((s,c,i)=>s+c.p*carrito[i],0);
const items=()=>cocteles.reduce((s,_,i)=>s+carrito[i],0);

function renderMenu(){
  document.getElementById("menu").innerHTML=cocteles.map((c,i)=>`
    <div class="card ${i === 0 ? 'promo' : ''}" style="background:${c.bg};border:0.5px solid ${c.border}">
      <div class="card-img" style="background-image: url('${c.img}'); background-size: cover; background-position: center;"></div>
      <div class="card-body">
        <div class="card-name">${c.n}</div>
        <div class="card-price">${fmt(c.p)}</div>
        <div class="ing-label">Descripción</div>
<div class="tags" style="background:none; border:none; padding:4px 0; font-size:13px; color:#f0e6d3; line-height:1.4;">
  ${c.desc}
</div>
        <div class="qty-row">
          <div class="qty-ctrl">
            <button class="qb" onclick="chgQty(${i},-1)">−</button>
            <div class="qn" id="qn-${i}">1</div>
            <button class="qb" onclick="chgQty(${i},1)">+</button>
          </div>
          <button class="add-btn" id="ab-${i}" onclick="agregar(${i})">Agregar</button>
        </div>
      </div>
    </div>
  `).join("");
}

function chgQty(i,d){
  cant[i]=Math.max(1,cant[i]+d);
  document.getElementById("qn-"+i).textContent=cant[i];
}

function agregar(i){
  carrito[i]+=cant[i];
  cant[i]=1;
  document.getElementById("qn-"+i).textContent=1;
  const btn=document.getElementById("ab-"+i);
  btn.textContent="✓ ("+carrito[i]+")";
  btn.classList.add("added");
  setTimeout(()=>{btn.textContent="Agregar";btn.classList.remove("added");},1400);
  updateBar();
}

function updateBar(){
  const t=total(),n=items();
  document.getElementById("cart-total").textContent=fmt(t);
  document.getElementById("cart-items").textContent=n+(n===1?" ítem":" ítems");
  document.getElementById("cart-bar").classList.toggle("visible",n>0);
}

function renderOrderItems(){
  const its=cocteles.map((c,i)=>{return{...c,qty:carrito[i],idx:i};}).filter(x=>x.qty>0);
  if(!its.length){
    document.getElementById("order-items").innerHTML='<div class="empty-note">Sin ítems. Cierra y agrega cócteles.</div>';
  } else {
    document.getElementById("order-items").innerHTML=its.map(x=>`
      <div class="oi">
        <div class="oi-left">
          <div class="oi-name">${x.n}</div>
          <div class="oi-qty">${x.qty} unidad${x.qty>1?"es":""}</div>
        </div>
        <div class="oi-right">
          <div class="oi-price">${fmt(x.p*x.qty)}</div>
          <button class="oi-del" onclick="quitarItem(${x.idx})">×</button>
        </div>
      </div>
    `).join("");
  }
  const t=total();
  document.getElementById("modal-total").textContent=fmt(t);
  document.getElementById("qr-amount").textContent=fmt(t);
}

function quitarItem(i){
  carrito[i]=0;
  updateBar();
  renderOrderItems();
}

function abrirModal(){
  renderOrderItems();
  document.getElementById("mesa").value="";
  document.getElementById("notas").value="";
  metodo="nequi";
  document.querySelectorAll(".pay-tab").forEach((t,i)=>t.classList.toggle("active",i===0));
  document.getElementById("pay-label").textContent="Nequi";
  document.getElementById("qr-img").src=QR_N;
  document.getElementById("form-view").style.display="block";
  document.getElementById("success-view").style.display="none";
  document.getElementById("overlay").classList.add("open");
}

function switchPay(m,el){
  metodo=m;
  document.querySelectorAll(".pay-tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("qr-img").src=m==="nequi"?QR_N:QR_B;
  document.getElementById("pay-label").textContent=m==="nequi"?"Nequi":"Bancolombia";
}

function cerrar(){document.getElementById("overlay").classList.remove("open");}

function cerrarReset(){
  cocteles.forEach((_,i)=>{carrito[i]=0;cant[i]=1;});
  updateBar();
  cerrar();
}

async function enviarPedido() {
  const mesa = document.getElementById("mesa").value;
  const notas = document.getElementById("notas").value;
  if (!mesa) { alert("Por favor ingresa el número de mesa"); return; }

  const its = cocteles.map((c, i) => ({ ...c, qty: carrito[i] })).filter(x => x.qty > 0);
  if (!its.length) { alert("No hay ítems en el pedido"); return; }

  let totalMsg = 0;
  const lineas = its.map(x => {
    const sub = x.p * x.qty;
    totalMsg += sub;
    return `  • ${x.n} x${x.qty} = ${fmt(sub)}`;
  }).join("\n");

  const msg = `🛎️ *NUEVO PEDIDO* 🛎️\n\n${lineas}\n\n💵 *Total: ${fmt(totalMsg)}*\n🪑 *Mesa: ${mesa}*\n💳 *Pago: ${metodo === "nequi" ? "Nequi" : "Bancolombia"}*${notas ? `\n📝 *Nota: ${notas}*` : ""}`;

  // ⚙️ CONFIGURACIÓN - REEMPLAZA CON TUS DATOS
  const TELEGRAM_TOKEN = '8513311150:AAE87aVBXkI_pN7zjiwQTZd4_KjlFn6SIgc';
  const TELEGRAM_CHAT_ID = '6646169532';
  // -------------------------------------------

  const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;

  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: TELEGRAM_CHAT_ID,
        text: msg,
        parse_mode: 'Markdown'
      })
    });

    if (!response.ok) {
      const errorData = await response.json();
      console.error('Error al enviar a Telegram:', errorData);
      alert('Hubo un problema al enviar el pedido. Revisa la consola.');
      return;
    }

  } catch (error) {
    console.error('Error de red:', error);
    alert('No se pudo conectar con Telegram.');
    return;
  }

  document.getElementById("form-view").style.display = "none";
  document.getElementById("success-view").style.display = "block";
}

document.getElementById("overlay").addEventListener("click",function(e){if(e.target===this)cerrar();});
renderMenu();
</script>
</body>
</html>
